<div class="card">
  @if (!estEnTrainDeModifier) {
    <p>Nom : {{ nom }}</p>
    <p>Ville : {{ ville }}</p>
    
    <button (click)="basculerMode()">Modifier</button>
    <button (click)="supprimerPersonne()">Supprimer</button>

  } @else {
    <p>Modification en cours...</p>
    
    <input type="text" [(ngModel)]="nom">
    <input type="text" [(ngModel)]="ville">

    <button (click)="basculerMode()">Annuler</button>
    <button (click)="sauvegarder()">Sauvegarder</button>
  }
</div>
