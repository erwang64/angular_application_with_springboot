<h1>Ma superbe Application</h1>

@if (listePersonnes.length > 0) {
  
  @for (p of listePersonnes; track p.nom) {
    
      <app-personne [nom]="p.nom" [ville]="p.ville"></app-personne>

  }

} @else {
  <p>La liste est vide</p>
}

<h2>Ajouter une personne</h2>
    <form [formGroup]="form" (ngSubmit)="ajouterPersonne()">
      <div>
        <label for="name">Nom</label>
        <input type="text" id="name" formControlName="name" />
      </div>
      <div>
        <label for="ville">Ville</label>
        <input type="text" id="ville" formControlName="ville" />
      </div>
      <button type="submit" [disabled]="form.invalid">Envoyer</button>
    </form>
